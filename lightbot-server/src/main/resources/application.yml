server:
  port: 8081

spring:
  main:
    allow-circular-references: true
  application:
    name: lightbot
  # 文件上传大小限制
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  autoconfigure:
    exclude:
      # Chat 由 ModelFactory 按数据库配置动态创建，禁用全局自动装配
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration

  # ========================================
  # PostgreSQL 数据库配置
  # 驱动：org.postgresql.Driver
  # 需要安装 pgvector 扩展用于向量存储
  # ========================================
  datasource:
    url: jdbc:postgresql://localhost:5432/lightbot
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # ========================================
  # Redis 配置（用于缓存、会话等）
  # ========================================
  data:
    redis:
      host: localhost
      port: 6379
      database: 9

  # ========================================
  # SpringAI 模型配置
  # api-key 通过环境变量注入（与系统环境变量同名）
  #   DASHSCOPE_API_KEY  — 通义千问
  #   OPENAI_API_KEY     — OpenAI / DeepSeek 等兼容 API
  # Chat 模型由 ModelFactory 按数据库 model_provider 动态创建；
  # 此处配置供 Embedding 默认值及 OpenAIModelHandler 参考。
  # ========================================
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-plus
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini

# ========================================
# MyBatis-Plus 配置
# type-enums-package：枚举类包路径，自动映射枚举值
# default-enum-type-handler：MyBatis-Plus 枚举处理器
# map-underscore-to-camel-case：下划线转驼峰
# ========================================
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-enums-package: com.lightbot.enums
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# ========================================
# Sa-Token 认证配置
# 官方文档：https://sa-token.cc
# token-name：前端传递 Token 的请求头名称
# timeout：Token 有效期（秒），默认86400（24小时）
# active-timeout：Token 最长无操作时间（秒），-1表示不限
# is-concurrent：是否允许同一账号并发登录
# is-share：多人登录同一账号时是否共用同一个 Token
# token-style：Token 样式（uuid/simple-uuid/random-32 等）
# ========================================
sa-token:
  token-name: Authorization
  timeout: 604800
  active-timeout: 3600
  active-timeout-check: true
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false
  is-read-param: true
  # Redis 配置：session 持久化到 Redis，重启不丢失
  redis:
    key-prefix: 'sa-token:'
    database: 0

# ========================================
# MinIO 对象存储配置
# 官方文档：https://min.io
# endpoint：MinIO 服务地址（本地默认 9000 端口）
# access-key / secret-key：MinIO 访问凭证
# bucket：存储桶名称，首次使用时自动创建
# ========================================
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: lightbot

# ========================================
# Neo4j 图数据库配置（知识图谱）
# uri：Bolt 协议地址
# username / password：认证凭证
# ========================================
neo4j:
  uri: bolt://localhost:7687
  username: neo4j
  password: ${NEO4J_PASSWORD:neo4j123}

# 系统配置
lightbot:
# ========================================
# OCR 配置（RapidOCR）
# enabled：是否启用 OCR 功能
# model-path：模型存放路径（仅用于健康检查展示，实际使用内置 PP-OCRv4 模型）
# auto-download：是否自动下载（内置模型无需下载，此配置预留）
# ========================================
  ocr:
    enabled: false
    model-path: D:\models\RapidOCR\PP-OCRv4
    auto-download: true
  task:
    consumer:
      pool-size: 2
  # ========================================
  # Milvus 向量数据库配置
  # enabled：是否启用 Milvus（未部署时设为 false）
  # uri：Milvus 服务地址
  # token：认证令牌（standalone 模式默认为空）
  # ========================================
  milvus:
    enabled: true
    uri: http://localhost:19530
    token: ""
    connect-timeout-ms: 10000
    wait-timeout-ms: 30000
# ========================================
# 内置工具 API Key 配置
# ========================================
  # GitHub API Token（可选，提升 API 速率限制，Code Search API 必需）
  # 获取地址：https://github.com/settings/tokens → Fine-grained tokens
  # 环境变量：GITHUB_TOKEN
  github:
    token: ${GITHUB_TOKEN:}
  # Tavily 联网搜索 API Key
  # 获取地址：https://tavily.com → API Keys
  # 环境变量：TAVILY_API_KEY
  tavily:
    api-key: ${TAVILY_API_KEY:}
  # SiliconFlow AI 生图 API Key
  # 获取地址：https://siliconflow.cn → API Keys
  # 环境变量：SILICONFLOW_API_KEY
  siliconflow:
    api-key: ${SILICONFLOW_API_KEY:}




# ========================================
# SpringDoc / Swagger 配置
# 访问地址：http://localhost:8080/swagger-ui.html
# ========================================
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs


